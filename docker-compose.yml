services:
  # L'applicazione principale (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fleet_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - fleet_network
    depends_on:
      - mysql
      - redis

  # Il server Web
  nginx:
    image: nginx:alpine
    container_name: fleet_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fleet_network
    depends_on:
      - app

  # Il Database
  mysql:
    image: mysql:8.0
    container_name: fleet_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lavarel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: lavarel}
      MYSQL_PASSWORD: lavarel
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fleet_network

  # Cache e Code (necessario per mail veloci)
  redis:
    image: redis:alpine
    container_name: fleet_redis
    restart: unless-stopped
    networks:
      - fleet_network

  # LO SCHEDULER: Gestisce l'invio automatico delle mail ogni mattina
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fleet_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    # Questo comando sostituisce il CRON del server
    command: php artisan schedule:work
    networks:
      - fleet_network
    depends_on:
      - mysql
      - redis

  # IL WORKER: Gestisce le code (se decidi di inviare mail in background)
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fleet_worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan queue:work
    networks:
      - fleet_network
    depends_on:
      - mysql
      - redis

networks:
  fleet_network:
    driver: bridge

volumes:
  db_data:
    driver: local
